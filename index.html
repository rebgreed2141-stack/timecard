<!DOCTYPE html>
<html lang="ja">
<head>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon-192.png">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>タイムカード</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="tabs">
    <div class="tabs-left">
      <button class="tab-btn active" data-tab="input">入力</button>
      <button class="tab-btn" data-tab="calendar">カレンダー</button>
      <button class="tab-btn" data-tab="admin">管理</button>
      <button class="tab-btn" data-tab="version">バージョン</button>
    </div>
  </div>

  <section id="tab-input" class="tab-panel active">
    <div id="today-label" class="today-label"></div>
    <div id="staff-list" class="staff-list"></div>
  </section>

  <section id="tab-calendar" class="tab-panel">
    <div class="calendar-wrap">
      <div class="calendar-header">
        <button id="prev-month-btn" class="month-nav-btn">前月</button>
        <div class="calendar-title-wrap">
          <h2 id="calendar-title" class="calendar-title"></h2>
          <div id="calendar-period" class="calendar-period"></div>
        </div>
        <button id="next-month-btn" class="month-nav-btn">次月</button>
      </div>

      <div class="calendar-weekdays">
        <div>月</div>
        <div>火</div>
        <div>水</div>
        <div>木</div>
        <div>金</div>
        <div>土</div>
        <div>日</div>
      </div>

      <div id="calendar-grid" class="calendar-grid"></div>
    </div>
  </section>

  <section id="tab-admin" class="tab-panel">
    <div class="admin-wrap">
      <div class="admin-card nursery-card">
        <div class="admin-card-title">保育園設定</div>
        <div class="nursery-radio-group">
          <label class="nursery-radio-option">
            <input type="radio" name="nursery" value="m" id="nursery-m">
            <span>こどもの森保育園</span>
          </label>
          <label class="nursery-radio-option">
            <input type="radio" name="nursery" value="y" id="nursery-y">
            <span>こどもの森You保育園</span>
          </label>
        </div>
        <div id="nursery-current" class="nursery-current"></div>
      </div>

      <div class="admin-card">
        <button id="backup-btn" class="admin-btn">バックアップ</button>
        <button id="restore-btn" class="admin-btn">データの復元</button>
        <button id="delete-btn" class="admin-btn danger-btn">データの削除</button>
        <input type="file" id="restore-file" accept=".zip" hidden>
      </div>
    </div>
  </section>

  <section id="tab-version" class="tab-panel">
    <div class="version-wrap">
      <div class="version-row">
        <div class="version-label">現在のバージョン</div>
        <div id="current-version" class="version-value">読み込み中...</div>
      </div>
      <div class="version-row">
        <div class="version-label">最新のバージョン</div>
        <div id="latest-version" class="version-value">確認中...</div>
      </div>
      <button id="update-btn" class="admin-btn" disabled>更新する</button>
    </div>
  </section>

  <script src="app.js"></script>
</body>
</html>
