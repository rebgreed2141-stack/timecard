<!DOCTYPE html>
<html lang="ja">
<head>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>  
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>タイムカード</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="tabs">
    <button class="tab-btn active" data-tab="input">入力</button>
    <button class="tab-btn" data-tab="list">一覧</button>
    <button class="tab-btn" data-tab="admin">管理</button>
  </div>

  <section id="tab-input" class="tab-panel active">
    <div id="staff-list" class="staff-list"></div>
  </section>

  <section id="tab-list" class="tab-panel">
    <div class="list-wrap">
      <h2 id="list-date-title" class="list-date-title"></h2>
      <table class="time-table">
        <thead>
          <tr>
            <th>職員名</th>
            <th>出勤</th>
            <th>退勤</th>
          </tr>
        </thead>
        <tbody id="list-body"></tbody>
      </table>
    </div>
  </section>

  <section id="tab-admin" class="tab-panel">
    <div class="admin-wrap">
      <button id="backup-btn" class="admin-btn">バックアップ</button>
      <button id="restore-btn" class="admin-btn">データの復元</button>
      <button id="delete-btn" class="admin-btn danger-btn">データの削除</button>
      <input type="file" id="restore-file" accept=".csv" hidden>
    </div>
  </section>

  <script src="app.js"></script>
  <script>
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("./sw.js");
  }
  </script>  
</body>
</html>
